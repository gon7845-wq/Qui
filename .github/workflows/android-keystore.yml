# À lancer UNE SEULE FOIS (onglet Actions → Generate Android Keystore → Run workflow).
# Génère la clé de signature Android et la dépose en artifact (keystore + mots de passe).
# ⚠️ Télécharge l'artifact, mets les 4 valeurs dans les Secrets du repo, garde une
# copie du keystore en lieu sûr, puis SUPPRIME l'artifact du run.
name: Generate Android Keystore

on:
  workflow_dispatch:

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate keystore
        run: |
          STOREPASS=$(openssl rand -hex 16)
          keytool -genkeypair -v -keystore upload.keystore -alias qui-upload \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STOREPASS" -keypass "$STOREPASS" \
            -dname "CN=Qui, OU=Mobile, O=Qui, C=FR"
          base64 -w0 upload.keystore > ANDROID_KEYSTORE_BASE64.txt
          {
            echo "Secrets à créer dans Settings → Secrets and variables → Actions :"
            echo ""
            echo "ANDROID_KEYSTORE_BASE64   → contenu du fichier ANDROID_KEYSTORE_BASE64.txt"
            echo "ANDROID_KEYSTORE_PASSWORD → $STOREPASS"
            echo "ANDROID_KEY_PASSWORD      → $STOREPASS"
            echo "ANDROID_KEY_ALIAS         → qui-upload"
          } > SECRETS_A_CREER.txt

      - uses: actions/upload-artifact@v4
        with:
          name: android-keystore-A-SUPPRIMER-APRES
          path: |
            upload.keystore
            ANDROID_KEYSTORE_BASE64.txt
            SECRETS_A_CREER.txt
